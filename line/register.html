<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>立即加入會員</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root {
      --line: #06c755;
      --line-dark: #05a847;
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #dbe2ea;
      --success-bg: #ecfdf3;
      --success-text: #0f7a3b;
      --error-bg: #fff2f2;
      --error-text: #c62828;
      --info-bg: #eef6ff;
      --info-text: #245ea8;
      --shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
      --radius-xl: 22px;
      --radius-lg: 14px;
      --radius-md: 12px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", "Noto Sans TC", Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(6, 199, 85, 0.08), transparent 28%),
        linear-gradient(180deg, #f8fbff 0%, #f3f6fb 100%);
      color: var(--text);
    }

    body {
      min-height: 100vh;
    }

    .page {
      max-width: 560px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .hero {
      text-align: center;
      margin-bottom: 18px;
      padding-top: 8px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(6, 199, 85, 0.10);
      color: var(--line-dark);
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 14px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: 30px;
      line-height: 1.2;
      letter-spacing: 0.2px;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 15px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 22px 18px 20px;
      border: 1px solid rgba(219, 226, 234, 0.8);
    }

    .section-title {
      font-size: 18px;
      font-weight: 800;
      margin: 0 0 6px;
    }

    .section-desc {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .benefits {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }

    .benefit {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 12px 14px;
      border-radius: 14px;
      background: #f8fafc;
      border: 1px solid #edf2f7;
    }

    .benefit-icon {
      width: 28px;
      height: 28px;
      min-width: 28px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: rgba(6, 199, 85, 0.12);
      color: var(--line-dark);
      font-size: 14px;
      font-weight: 700;
      margin-top: 1px;
    }

    .benefit strong {
      display: block;
      font-size: 14px;
      margin-bottom: 2px;
    }

    .benefit span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    form {
      margin-top: 4px;
    }

    .field {
      margin-bottom: 16px;
    }

    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 7px;
      gap: 8px;
    }

    label {
      font-size: 14px;
      font-weight: 700;
      color: #111827;
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
    }

    input {
      width: 100%;
      padding: 14px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 15px;
      color: var(--text);
      background: #fff;
      outline: none;
      transition: all 0.2s ease;
    }

    input:focus {
      border-color: rgba(6, 199, 85, 0.7);
      box-shadow: 0 0 0 4px rgba(6, 199, 85, 0.12);
    }

    input[readonly] {
      background: #f8fafc;
      color: #4b5563;
    }

    .actions {
      margin-top: 8px;
    }

    .btn {
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 15px 16px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(180deg, #10d663 0%, #06c755 100%);
      color: #fff;
      box-shadow: 0 10px 24px rgba(6, 199, 85, 0.22);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-secondary {
      margin-top: 10px;
      background: #eef2f7;
      color: #334155;
    }

    .status {
      margin-top: 14px;
      padding: 13px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.6;
      display: none;
      white-space: pre-line;
    }

    .status.show {
      display: block;
    }

    .status.loading {
      display: block;
      background: var(--info-bg);
      color: var(--info-text);
      border: 1px solid #d8e8ff;
    }

    .status.success {
      display: block;
      background: var(--success-bg);
      color: var(--success-text);
      border: 1px solid #cdeed9;
    }

    .status.error {
      display: block;
      background: var(--error-bg);
      color: var(--error-text);
      border: 1px solid #ffd7d7;
    }

    .footer-note {
      text-align: center;
      margin-top: 16px;
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.7;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 480px) {
      .page {
        padding: 18px 14px 32px;
      }

      .hero h1 {
        font-size: 26px;
      }

      .card {
        padding: 18px 16px 18px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <div class="badge">LINE 會員註冊</div>
      <h1>立即加入會員</h1>
      <p>
        完成基本資料填寫後，即可建立會員身份。<br />
        後續可延伸預約、查詢、專屬通知與會員優惠。
      </p>
    </div>

    <div class="card">
      <h2 class="section-title">完成註冊只要 1 分鐘</h2>
      <p class="section-desc">
        系統將自動綁定您的 LINE 帳號，後續互動與會員識別會更加順暢。
      </p>

      <div class="benefits">
        <div class="benefit">
          <div class="benefit-icon">✓</div>
          <div>
            <strong>快速建立會員資料</strong>
            <span>完成一次填寫後，後續可作為預約、查詢與通知基礎。</span>
          </div>
        </div>
        <div class="benefit">
          <div class="benefit-icon">✓</div>
          <div>
            <strong>綁定 LINE 身份</strong>
            <span>將 LINE 使用者與會員資料對應，減少後續重複確認成本。</span>
          </div>
        </div>
        <div class="benefit">
          <div class="benefit-icon">✓</div>
          <div>
            <strong>為後續服務做好準備</strong>
            <span>可延伸會員分群、通知、自動化流程與專屬優惠設計。</span>
          </div>
        </div>
      </div>

      <form id="registerForm" novalidate>
        <div class="field">
          <div class="label-row">
            <label for="lineName">LINE 顯示名稱</label>
            <span class="hint">系統自動帶入</span>
          </div>
          <input id="lineName" readonly placeholder="初始化中..." />
        </div>

        <div class="field">
          <div class="label-row">
            <label for="fullName">姓名</label>
            <span class="hint">必填</span>
          </div>
          <input id="fullName" required placeholder="請輸入您的姓名" />
        </div>

        <div class="field">
          <div class="label-row">
            <label for="phone">手機</label>
            <span class="hint">必填</span>
          </div>
          <input id="phone" inputmode="tel" required placeholder="例如 0912345678" />
        </div>

        <div class="field">
          <div class="label-row">
            <label for="email">Email</label>
            <span class="hint">必填</span>
          </div>
          <input id="email" type="email" required placeholder="例如 name@email.com" />
        </div>

        <div class="actions">
          <button id="submitBtn" class="btn btn-primary" type="submit">送出註冊</button>
          <button id="backBtn" class="btn btn-secondary hidden" type="button">返回 LINE 對話</button>
        </div>

        <div id="message" class="status"></div>
      </form>

      <div class="footer-note">
        完成註冊後，系統將自動嘗試返回 LINE 對話視窗。<br />
        若未自動返回，可點擊下方按鈕或手動返回 LINE。
      </div>
    </div>
  </div>

  <script>
    const LIFF_ID = "2009560041-gDgYmh0o";
    const API_URL = "https://ckctng3umumrkryvryduuoytbq0szzur.lambda-url.ap-northeast-1.on.aws/";

    let profileData = null;
    let isSubmitting = false;

    const form = document.getElementById("registerForm");
    const lineNameInput = document.getElementById("lineName");
    const fullNameInput = document.getElementById("fullName");
    const phoneInput = document.getElementById("phone");
    const emailInput = document.getElementById("email");
    const submitBtn = document.getElementById("submitBtn");
    const backBtn = document.getElementById("backBtn");
    const messageBox = document.getElementById("message");

    function setMessage(type, text) {
      messageBox.className = `status show ${type}`;
      messageBox.textContent = text;
    }

    function clearMessage() {
      messageBox.className = "status";
      messageBox.textContent = "";
    }

    function setSubmitting(loading) {
      isSubmitting = loading;
      submitBtn.disabled = loading;
      submitBtn.textContent = loading ? "送出中..." : "送出註冊";
    }

    function normalizePhone(phone) {
      const raw = String(phone || "").trim().replace(/[\s\-()]/g, "");

      if (raw.startsWith("+8869")) {
        return "0" + raw.slice(4);
      }

      if (raw.startsWith("8869")) {
        return "0" + raw.slice(3);
      }

      return raw;
    }

    function validateForm(payload) {
      if (!payload.line_user_id) {
        return "無法取得 LINE 使用者資訊，請重新開啟頁面後再試。";
      }

      if (!payload.full_name) {
        return "請輸入姓名。";
      }

      if (!payload.phone) {
        return "請輸入手機號碼。";
      }

      if (!/^09\d{8}$/.test(payload.phone)) {
        return "手機格式不正確，請輸入 09 開頭的 10 碼手機號碼。";
      }

      if (!payload.email) {
        return "請輸入 Email。";
      }

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(payload.email)) {
        return "Email 格式不正確，請重新確認。";
      }

      return "";
    }

    async function sendWelcomeMessage(displayName) {
      const safeName = String(displayName || "").trim() || "您";

      try {
        if (window.liff && liff.isInClient()) {
          await liff.sendMessages([
            {
              type: "text",
              text: `${safeName} 歡迎註冊`
            }
          ]);
        }
      } catch (err) {
        console.warn("sendMessages error:", err);
      }
    }

    async function closeLiffWindowWithFallback(displayName) {
      await sendWelcomeMessage(displayName);

      try {
        if (window.liff && liff.isInClient()) {
          liff.closeWindow();
          return;
        }
      } catch (err) {
        console.error("closeWindow error:", err);
      }

      backBtn.classList.remove("hidden");
      setMessage("success", "註冊成功。\n若未自動返回 LINE，請點擊下方按鈕返回對話視窗。");
    }

    async function initLiff() {
      setMessage("loading", "正在初始化 LINE 身份資訊...");

      await liff.init({ liffId: LIFF_ID });

      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }

      profileData = await liff.getProfile();

      lineNameInput.value = profileData?.displayName || "";
      if (!fullNameInput.value && profileData?.displayName) {
        fullNameInput.value = profileData.displayName;
      }

      clearMessage();

      console.log("LIFF ready");
      console.log("isInClient =", liff.isInClient());
      console.log("isLoggedIn =", liff.isLoggedIn());
      console.log("userId =", profileData?.userId || "");
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      if (isSubmitting) return;

      const payload = {
        line_user_id: profileData?.userId || "",
        line_display_name: profileData?.displayName || "",
        full_name: fullNameInput.value.trim(),
        phone: normalizePhone(phoneInput.value),
        email: emailInput.value.trim(),
        register_source: "richmenu_liff_register"
      };

      const validationError = validateForm(payload);
      if (validationError) {
        setMessage("error", validationError);
        return;
      }

      setSubmitting(true);
      setMessage("loading", "資料送出中，請稍候...");

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const text = await res.text();
        let data = {};
        try {
          data = text ? JSON.parse(text) : {};
        } catch (parseErr) {
          console.warn("response parse failed:", parseErr);
        }

        if (res.status === 200) {
          setMessage("success", (data.message || "註冊成功") + "\n系統將自動返回 LINE 對話視窗...");
          backBtn.classList.add("hidden");

          setTimeout(async () => {
            await closeLiffWindowWithFallback(payload.full_name);
          }, 1200);
          return;
        }

        if (res.status === 409) {
          setMessage("success", (data.message || "此 LINE 帳號已完成註冊") + "\n系統將自動返回 LINE 對話視窗...");
          backBtn.classList.add("hidden");

          setTimeout(async () => {
            await closeLiffWindowWithFallback(payload.full_name);
          }, 1200);
          return;
        }

        setMessage("error", data.message || data.error || "註冊失敗，請稍後再試。");
      } catch (err) {
        console.error("submit error:", err);
        setMessage("error", "目前無法完成送出，請確認網路狀態後再試。");
      } finally {
        setSubmitting(false);
      }
    });

    backBtn.addEventListener("click", async () => {
      try {
        if (window.liff && liff.isInClient()) {
          liff.closeWindow();
          return;
        }
      } catch (err) {
        console.error(err);
      }

      window.location.href = "https://line.me/R/";
    });

    initLiff().catch((err) => {
      console.error("LIFF init error:", err);
      setMessage("error", "LIFF 初始化失敗，請從 LINE 圖文選單重新開啟頁面。");
      backBtn.classList.remove("hidden");
    });
  </script>
</body>
</html>
