name: Update Invoice Prize Data

on:
  schedule:
    - cron: '0 2 1,16 * *'   # 每月 1 日與 16 日 02:00 UTC（台灣時間 10:00）
  workflow_dispatch:           # 支援手動觸發

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and parse invoice data
        run: python3 .github/scripts/fetch_invoice.py > prize-data.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prize-data.json
          git diff --cached --quiet || git commit -m "chore: update prize data [skip ci]"
          git push
