<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>思傑 & 彥綾｜溫馨電子喜帖</title>
  <meta name="description" content="思傑與彥綾的電子喜帖，誠摯邀請您於 2026/10/11 一同見證幸福時刻。" />
  <link rel="canonical" href="https://digitools-studio.github.io/index/weddings/sijie-yanling/" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="zh_TW" />
  <meta property="og:title" content="思傑 & 彥綾｜我們要結婚啦" />
  <meta property="og:description" content="誠摯邀請您於 2026/10/11 一同見證思傑與彥綾的幸福時刻。" />
  <meta property="og:image" content="https://digitools-studio.github.io/index/weddings/sijie-yanling/images/og-preview.svg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="theme-color" content="#C38879" />
  <style>
    :root {
      --rose:#C38879; --rose-2:#DEAA9B; --rose-3:#EBC7BC; --cream:#FFF9F4; --paper:#FFFDF9;
      --gold:#F4CEA7; --coffee:#58301F; --coffee-2:#7A4A3C; --muted:#8C6B5E;
      --line:rgba(88,48,31,.14); --shadow:0 24px 70px rgba(88,48,31,.18);
      --safe-top:max(10px, env(safe-area-inset-top, 0px)); --safe-bottom:max(18px, env(safe-area-inset-bottom, 0px));
      --ui-top-clearance:62px; --ui-bottom-clearance:112px; --vh:1vh;
    }
    *{box-sizing:border-box}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:"Noto Serif TC","Noto Sans TC",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--coffee);background:linear-gradient(135deg,#C38879,#DEAA9B 55%,#F8E4D9)}
    button,input,select,textarea{font:inherit}
    button{cursor:pointer}
    a{color:inherit;text-decoration:none}
    .app{width:100%;height:100%;position:relative}

    .intro{position:fixed;inset:0;z-index:20;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 30% 18%,rgba(255,249,244,.55),transparent 32%),linear-gradient(135deg,#C38879,#E7B5A7 58%,#F7E2D6);transition:opacity .8s ease,transform .8s ease}
    .intro.is-hidden{opacity:0;pointer-events:none;transform:scale(1.02)}
    .intro-card{width:min(92vw,430px);padding:42px 28px 32px;border-radius:34px;background:rgba(255,253,249,.66);border:1px solid rgba(255,255,255,.55);box-shadow:var(--shadow);backdrop-filter:blur(18px);text-align:center}
    .intro-kicker,.eyebrow{margin:0 0 10px;font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--rose);font-weight:700}
    .intro-title{margin:0;font-size:42px;line-height:1.2;font-weight:600;letter-spacing:.08em}
    .intro-title span{display:block;margin-top:4px}
    .intro-divider{width:86px;height:1px;background:linear-gradient(90deg,transparent,var(--coffee),transparent);margin:22px auto}
    .intro-date{margin:0;font-size:18px;letter-spacing:.18em;color:var(--coffee-2)}
    .intro-copy{margin:18px auto 24px;max-width:330px;line-height:1.9;color:var(--muted);font-size:14px}
    .intro-btn,.action-btn,.submit-btn{border:0;border-radius:999px;padding:13px 20px;background:linear-gradient(135deg,var(--coffee),#8A4D3D);color:var(--cream);box-shadow:0 14px 34px rgba(88,48,31,.22);font-weight:700;letter-spacing:.06em}
    .xi-entry{position:relative;display:grid;place-items:center;width:112px;height:112px;margin:24px auto 0;border:0;border-radius:32px;background:linear-gradient(135deg,#8f2f24,#c75043);color:#fff;font-size:64px;line-height:1;box-shadow:0 18px 46px rgba(116,35,26,.28);isolation:isolate;transition:transform .22s ease,box-shadow .22s ease}

    .xi-entry::before{content:"";position:absolute;inset:10px;border:1px solid rgba(255,249,244,.58);border-radius:24px}

    .xi-entry::after{content:"";position:absolute;inset:-18px;border-radius:42px;background:radial-gradient(circle,rgba(199,28,24,.22),transparent 64%);opacity:0;transform:scale(.78);transition:opacity .22s ease,transform .22s ease;z-index:-1}

    .xi-entry:hover,.xi-entry:focus-visible{transform:translateY(-2px) scale(1.03);box-shadow:0 22px 54px rgba(116,35,26,.34)}

    .xi-entry:hover::after,.xi-entry:focus-visible::after{opacity:1;transform:scale(1)}

    .xi-entry:hover .xi-burst span,.xi-entry:focus-visible .xi-burst span{opacity:1;transform:translate(var(--x),var(--y)) scale(1)}

    .xi-burst{position:absolute;inset:0;pointer-events:none}

    .xi-burst span{position:absolute;left:50%;top:50%;color:#c51d1a;font-size:18px;font-weight:900;opacity:0;transform:translate(-50%,-50%) scale(.4);transition:opacity .28s ease,transform .42s cubic-bezier(.2,.84,.2,1)}

    .xi-burst span:nth-child(1){--x:-72px;--y:-44px}.xi-burst span:nth-child(2){--x:64px;--y:-48px}.xi-burst span:nth-child(3){--x:-62px;--y:46px}.xi-burst span:nth-child(4){--x:70px;--y:42px}.xi-burst span:nth-child(5){--x:0;--y:-72px}

    .intro.is-opening .intro-card{animation:introCardOpen .72s cubic-bezier(.2,.82,.2,1) both}
    .intro.is-opening .xi-entry{animation:xiSealOpen .72s cubic-bezier(.2,.82,.2,1) both}
    .xi-particles{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:24}
    .xi-particle{position:absolute;left:var(--start-x);top:var(--start-y);color:#c51d1a;font-size:var(--size);font-weight:900;text-shadow:0 6px 14px rgba(116,35,26,.18);opacity:0;transform:translate(-50%,-50%) scale(.35);animation:xiOpenBurst .9s cubic-bezier(.16,.9,.18,1) forwards;animation-delay:var(--delay)}
    @keyframes xiOpenBurst{0%{opacity:0;transform:translate(-50%,-50%) scale(.35) rotate(0deg)}12%{opacity:1}100%{opacity:0;transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(var(--scale)) rotate(var(--rot))}}
    @keyframes xiSealOpen{0%{transform:scale(1)}34%{transform:scale(1.08);box-shadow:0 26px 64px rgba(116,35,26,.38)}100%{transform:scale(.86) rotateX(20deg);opacity:.72}}
    @keyframes introCardOpen{0%{transform:scale(1);opacity:1}100%{transform:scale(1.04);opacity:.72}}
    .tap-note{display:none}

    .main{height:100%;opacity:0;transition:opacity .8s ease}
    .main.is-ready{opacity:1}
    .slider{height:100%;width:100%;overflow:hidden;touch-action:pan-y}
    .slider.no-touch-swipe{touch-action:auto}
    .slides{height:100%;display:flex;transition:transform .72s cubic-bezier(.2,.82,.2,1);will-change:transform}
    .slides.is-dragging{transition:none}
    .slide{position:relative;flex:0 0 100%;width:100%;height:100%;overflow:hidden}
    .slide::before{content:"";position:absolute;inset:0;z-index:1;background:linear-gradient(180deg,rgba(255,253,249,.66),rgba(255,249,244,.44) 43%,rgba(88,48,31,.34))}
    .slide.paper::before{background:linear-gradient(180deg,rgba(255,253,249,.9),rgba(255,249,244,.72),rgba(195,136,121,.22))}
    .slide-bg{position:absolute;inset:0;background:radial-gradient(circle at 28% 12%,rgba(255,255,255,.56),transparent 30%),linear-gradient(135deg,#C38879,#E9B8AA 62%,#FFF3EA);transform:scale(1.04);transition:transform 5s ease}
    .slide.is-active .slide-bg{transform:scale(1.08)}
    .content{position:relative;z-index:2;height:100%;display:flex;align-items:center;justify-content:center;padding:calc(var(--ui-top-clearance) + var(--safe-top)) 22px calc(var(--ui-bottom-clearance) + var(--safe-bottom))}
    .scrollable{width:100%;height:100%;overflow:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;display:flex;align-items:flex-start;justify-content:center;padding:6px 0 34px;scroll-padding-top:12px;scroll-padding-bottom:84px}
    .paper-card{width:min(94vw,940px);border-radius:34px;background:rgba(255,253,249,.74);border:1px solid rgba(255,255,255,.62);box-shadow:var(--shadow);backdrop-filter:blur(16px);padding:24px}
    .slide.paper .content > :where(.paper-card,.hero-card,.photo-story-card,.form-card,.messages-card),
    .slide.paper .scrollable > :where(.paper-card,.form-card,.messages-card){outline:1px solid rgba(88,48,31,.18);outline-offset:7px;box-shadow:var(--shadow),0 0 0 8px rgba(255,253,249,.34),0 0 0 9px rgba(255,255,255,.42);background-clip:padding-box}
    .slide.paper .content > :where(.paper-card,.hero-card,.photo-story-card,.form-card,.messages-card)::after,
    .slide.paper .scrollable > :where(.paper-card,.form-card,.messages-card)::after{content:"";position:absolute;inset:-7px;border-radius:inherit;pointer-events:none;border:1px solid rgba(244,206,167,.34);box-shadow:inset 0 0 24px rgba(88,48,31,.06)}
    .paper-card,.hero-card,.photo-story-card,.form-card,.messages-card{position:relative}    .section-title{margin:0 0 12px;font-size:clamp(28px,5vw,48px);line-height:1.25;font-weight:600;letter-spacing:.04em}
    .subtitle,.small-note{margin:0;color:var(--muted);line-height:1.85;font-size:14px}
    .small-note{font-size:13px}
    .grid-2{display:grid;grid-template-columns:minmax(0,.95fr) minmax(0,1.05fr);gap:24px;align-items:center}
    .grid-2.reverse{grid-template-columns:minmax(0,1.05fr) minmax(0,.95fr)}

    .hero-card{width:min(94vw,520px);max-height:calc(var(--vh)*100 - 140px);overflow:auto;text-align:center;padding:24px 20px 20px;border-radius:34px;background:rgba(255,253,249,.78);border:1px solid rgba(255,255,255,.66);box-shadow:var(--shadow);backdrop-filter:blur(16px)}
    .hero-card::-webkit-scrollbar{display:none}
    .hero-card .eyebrow{margin:2px 0 14px;letter-spacing:.32em;color:rgba(122,74,60,.72)}
    .hero-names{margin:0 0 16px;font-size:clamp(27px,5.6vw,44px);line-height:1.2;font-weight:500;letter-spacing:.12em}
    .hero-date{display:inline-flex;align-items:center;gap:10px;margin:0 0 16px;padding:9px 16px;border-radius:999px;background:rgba(244,206,167,.26);border:1px solid rgba(88,48,31,.12);letter-spacing:.16em;font-size:13px;font-weight:800}
    .hero-actions{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:10px;margin-top:18px}
    .ghost-btn,.soft-btn{border:1px solid var(--line);border-radius:999px;padding:12px 16px;background:rgba(255,253,249,.66);color:var(--coffee);font-weight:700;box-shadow:0 12px 26px rgba(88,48,31,.10)}
    .soft-btn{background:rgba(244,206,167,.22)}

    .photo-slot{position:relative;overflow:hidden;margin:0;border-radius:28px;border:1px solid rgba(255,255,255,.72);background:linear-gradient(135deg,rgba(195,136,121,.26),rgba(255,249,244,.74));box-shadow:0 18px 48px rgba(88,48,31,.16);min-height:280px}
    .photo-slot img{width:100%;height:100%;object-fit:cover;display:block}
    .photo-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;background:radial-gradient(circle at 35% 20%,rgba(255,255,255,.68),transparent 35%),linear-gradient(135deg,rgba(195,136,121,.5),rgba(244,206,167,.24),rgba(255,253,249,.72));font-size:18px;color:var(--coffee)}
    .photo-slot.cover{min-height:300px;margin:0 0 18px}
    .photo-slot.story{min-height:420px}
    .photo-slot.timeline{min-height:300px}
    .photo-slot.detail{min-height:260px}

    .story-copy{padding:8px}
    .story-copy p{margin:0 0 14px;color:var(--muted);line-height:1.9;font-size:15px}
    .story-caption{display:inline-flex;margin-top:8px;padding:8px 12px;border-radius:999px;background:rgba(244,206,167,.24);color:var(--coffee-2);font-size:12px;font-weight:700}
    .timeline-nav{display:flex;justify-content:center;gap:8px;margin:16px 0 18px;flex-wrap:wrap}
    .timeline-nav button{border:1px solid var(--line);background:rgba(255,253,249,.62);border-radius:999px;padding:9px 14px;color:var(--coffee);font-weight:800}
    .timeline-nav button.is-active{background:var(--coffee);color:var(--cream)}
    .timeline-year{font-size:clamp(58px,13vw,108px);line-height:.95;margin:0;color:rgba(88,48,31,.14);font-weight:800;letter-spacing:.04em}

    /* 前 3 頁 Timeline：照片作為主要背景 + 淡遮罩 + 漂浮式文字卡 */
    .photo-story-card{
      position:relative;
      width:min(94vw,980px);
      height:min(76vh,660px);
      min-height:500px;
      overflow:hidden;
      border-radius:34px;
      border:1px solid rgba(255,255,255,.66);
      box-shadow:var(--shadow);
      background:rgba(255,253,249,.72);
      isolation:isolate;
    }

    .photo-story-card img{
      position:absolute;
      inset:0;
      z-index:0;
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:var(--pos,50% 42%);
      display:block;
      transform:scale(1.01);
      transition:transform 5s ease;
    }

    .slide.is-active .photo-story-card img{transform:scale(1.045)}

    .photo-story-overlay{
      position:absolute;
      inset:0;
      z-index:1;
      pointer-events:none;
      background:
        radial-gradient(ellipse at 24% 52%,rgba(255,253,249,.56) 0%,rgba(255,253,249,.34) 32%,rgba(255,249,244,.10) 58%,transparent 74%),
        radial-gradient(circle at 50% 24%,rgba(255,253,249,.06),transparent 34%),
        linear-gradient(90deg,rgba(255,253,249,.32) 0%,rgba(255,253,249,.18) 34%,rgba(255,249,244,.06) 60%,rgba(88,48,31,.10) 100%);
    }

    .photo-story-card.copy-right .photo-story-overlay{
      background:
        radial-gradient(ellipse at 76% 52%,rgba(255,253,249,.56) 0%,rgba(255,253,249,.34) 32%,rgba(255,249,244,.10) 58%,transparent 74%),
        radial-gradient(circle at 50% 24%,rgba(255,253,249,.06),transparent 34%),
        linear-gradient(270deg,rgba(255,253,249,.32) 0%,rgba(255,253,249,.18) 34%,rgba(255,249,244,.06) 60%,rgba(88,48,31,.10) 100%);
    }

    .floating-copy{
      position:absolute;
      z-index:2;
      width:min(42%,430px);
      pointer-events:auto;
      color:var(--coffee);
    }

    .floating-copy--left{
      left:clamp(26px,6vw,72px);
      top:50%;
      transform:translateY(-50%);
      text-align:left;
    }

    .floating-copy--right{
      right:clamp(26px,6vw,72px);
      top:50%;
      transform:translateY(-50%);
      text-align:left;
    }

    .floating-copy--bottom{
      left:50%;
      bottom:clamp(18px,5vh,48px);
      transform:translateX(-50%);
      width:min(84%,520px);
      text-align:left;
    }

    .floating-copy-inner{
      padding:0;
      border:0;
      border-radius:0;
      background:transparent;
      box-shadow:none;
      backdrop-filter:none;
      -webkit-backdrop-filter:none;
      text-shadow:
        0 1px 0 rgba(255,253,249,.96),
        0 0 10px rgba(255,253,249,.94),
        0 8px 22px rgba(88,48,31,.28),
        0 16px 42px rgba(88,48,31,.20);
      filter:drop-shadow(0 1px 0 rgba(255,253,249,.62));
      animation:floatingTextDrift 7s ease-in-out infinite;
    }

    @keyframes floatingTextDrift{
      0%,100%{transform:translate3d(0,0,0)}
      50%{transform:translate3d(0,-6px,0)}
    }

    .floating-copy p{margin:0 0 14px;color:#2F160D;line-height:1.95;font-size:15px;font-weight:650;letter-spacing:.045em}
    .floating-copy .timeline-year{margin:0 0 16px;color:#4A2316;font-size:clamp(58px,13vw,108px);line-height:.88;font-weight:900;letter-spacing:.04em;text-shadow:0 1px 0 rgba(255,253,249,.95),0 0 16px rgba(255,253,249,.92),0 12px 30px rgba(88,48,31,.22)}
    .floating-copy .section-title{margin:0 0 18px;font-size:clamp(28px,4.3vw,46px);line-height:1.24;font-weight:820;letter-spacing:.045em;color:#2B120A;text-shadow:0 1px 0 rgba(255,253,249,.98),0 0 13px rgba(255,253,249,.96),0 8px 24px rgba(88,48,31,.32),0 18px 44px rgba(88,48,31,.18)}
    .floating-copy .timeline-caption{font-weight:820;color:#3B1B10;margin-bottom:18px;text-shadow:0 1px 0 rgba(255,253,249,.98),0 0 10px rgba(255,253,249,.92),0 7px 20px rgba(88,48,31,.30);-webkit-text-stroke:.16px rgba(255,253,249,.58);paint-order:stroke fill}
    .floating-copy .timeline-body{display:grid;gap:10px;color:#2F160D;text-shadow:0 1px 0 rgba(255,253,249,.98),0 0 10px rgba(255,253,249,.92),0 2px 8px rgba(255,253,249,.68),0 7px 20px rgba(88,48,31,.34);-webkit-text-stroke:.14px rgba(255,253,249,.52);paint-order:stroke fill}
    .floating-copy .timeline-body p{margin:0}
    .gallery-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-top:18px}
    .gallery-item{min-height:150px;aspect-ratio:4/5;border-radius:22px;cursor:pointer}
    .gallery-item::after{content:"⌕";position:absolute;right:10px;bottom:10px;width:30px;height:30px;display:grid;place-items:center;border-radius:50%;background:rgba(255,253,249,.88);border:1px solid rgba(88,48,31,.12);color:var(--coffee);font-size:18px;box-shadow:0 8px 20px rgba(88,48,31,.12)}

    .gallery-hint{display:inline-flex;align-items:center;gap:8px;margin-top:10px;padding:8px 12px;border-radius:999px;background:rgba(244,206,167,.24);color:var(--coffee-2);font-size:12px;font-weight:800}

    .details-card{text-align:center}
    .details-date{font-size:clamp(48px,12vw,92px);line-height:.95;margin:4px 0;color:var(--coffee);font-weight:700;letter-spacing:.08em}
    .details-list{display:grid;gap:10px;margin:20px auto;max-width:420px;text-align:left}
    .details-row{display:flex;justify-content:space-between;gap:12px;padding:12px 14px;border-radius:16px;background:rgba(195,136,121,.10);border:1px solid rgba(88,48,31,.09)}
    .details-row span{color:var(--muted);font-size:13px}
    .details-row b{text-align:right}
    .countdown-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:16px auto 4px;max-width:420px}

    .countdown-unit{padding:12px 8px;border-radius:18px;background:rgba(244,206,167,.24);border:1px solid rgba(88,48,31,.10);text-align:center}

    .countdown-unit b{display:block;font-size:clamp(22px,5vw,34px);line-height:1;color:var(--coffee)}

    .countdown-unit span{display:block;margin-top:6px;color:var(--muted);font-size:12px;font-weight:800}
    .form-card{width:min(94vw,760px)}
    .form-grid{display:grid;gap:14px;margin-top:18px}
    .field label{display:block;margin:0 0 7px;color:var(--coffee);font-weight:800;font-size:13px}
    .input,.select,.textarea{width:100%;border:1px solid rgba(88,48,31,.16);border-radius:16px;background:rgba(255,253,249,.78);padding:13px 14px;color:var(--coffee);outline:none}
    .textarea{min-height:98px;resize:vertical;line-height:1.7}
    .input:focus,.select:focus,.textarea:focus{border-color:rgba(195,136,121,.72);box-shadow:0 0 0 4px rgba(195,136,121,.12)}
    .radio-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .radio-grid.two{grid-template-columns:repeat(2,1fr)}
    .radio-chip{display:flex;align-items:center;justify-content:center;gap:7px;min-height:44px;padding:10px;border:1px solid rgba(88,48,31,.13);border-radius:999px;background:rgba(255,253,249,.62);font-size:13px;font-weight:700}
    .radio-chip input{accent-color:var(--rose)}
    .field-inline-error,.rsvp-dynamic-note{display:none;margin-top:8px;color:#9b3c3c;font-size:12px;line-height:1.6}
    .rsvp-dynamic-note{padding:10px 12px;border-radius:14px;background:rgba(244,206,167,.18);color:var(--coffee-2)}
    .live-preview,.summary-card{margin-top:8px;border-radius:18px;padding:14px;background:rgba(195,136,121,.10);border:1px solid rgba(88,48,31,.10)}
    .summary-row{display:flex;justify-content:space-between;gap:12px;padding:7px 0;border-bottom:1px solid rgba(88,48,31,.08)}
    .summary-row:last-child{border-bottom:0}
    .summary-row span{color:var(--muted)}
    .hint{min-height:22px;color:var(--coffee-2);font-size:13px;line-height:1.6}

     .messages-card{width:min(94vw,780px)}
    .message-layout{display:grid;grid-template-columns:1fr;gap:18px;margin-top:18px}
    .messages-divider{display:flex;align-items:center;gap:12px;margin:10px 0 2px;color:var(--coffee);font-weight:900;font-size:14px}
    .messages-divider:before,.messages-divider:after{content:"";height:1px;flex:1;background:rgba(88,48,31,.12)}
    .pinned-blessing{margin:16px 0;padding:15px 16px;border-radius:22px;background:linear-gradient(135deg,rgba(255,253,249,.82),rgba(244,206,167,.26));border:1px solid rgba(88,48,31,.11)}
    .pinned-label{display:inline-flex;border-radius:999px;background:rgba(195,136,121,.13);padding:5px 9px;font-size:11px;font-weight:800;color:var(--coffee-2)}
    .guideline-item{padding:10px 12px;border-radius:15px;background:rgba(195,136,121,.08);border:1px solid rgba(88,48,31,.08);color:var(--muted);font-size:12px;line-height:1.7}
    .honeypot{position:absolute;left:-9999px;opacity:0;height:0;overflow:hidden}
    .char-counter{margin-top:6px;text-align:right;color:var(--muted);font-size:12px}

    render(); audio=document.getElementById("audio"); updateMusicUi(false);
    document.getElementById("startBtn").addEventListener("click",startExperience);
    document.getElementById("prevBtn").addEventListener("click",()=>userGoTo(currentIndex-1));
    document.getElementById("nextBtn").addEventListener("click",()=>userGoTo(currentIndex+1));

    document.getElementById("musicBtn").addEventListener("click",toggleMusic);

  function handleDocumentClick(e){
    if(e.target.closest("[data-share]")){ openShareModal(); return; }
    if(e.target.closest("[data-share-close]") || e.target.id==="shareModal"){ closeShareModal(); return; }
    if(e.target.closest("[data-share-native]")){ shareInvitation(); return; }
    if(e.target.closest("[data-copy-share-link]")){ copyShareLink(); return; }
    if(e.target.closest("[data-download-card]")){ downloadInvitationCard(); return; }
    if(e.target.closest("[data-calendar-open]")){ openCalendarModal(); return; }
    if(e.target.closest("[data-calendar-close]") || e.target.id==="calendarModal"){ closeCalendarModal(); return; }
    if(e.target.closest("[data-calendar-google]")){ stopBackgroundMusic(); window.open(buildGoogleCalendarUrl(),"_blank","noopener"); track("calendar_google",{}); return; }
    if(e.target.closest("[data-calendar-ics]")){ downloadIcs(); return; }
    const map=e.target.closest("[data-map-link]"); if(map){ e.preventDefault(); openMapAndCloseSite(map.href); return; } const go=e.target.closest("[data-go]"); if(go){ userGoTo(Number(go.dataset.go)); return; }
    const open=e.target.closest("[data-gallery-open]"); if(open){ openGallery(Number(open.dataset.galleryOpen)); return; }
    if(e.target.closest("[data-gallery-close]") || e.target.id==="galleryLightbox"){ closeGallery(); return; }
    if(e.target.closest("[data-gallery-next]")){ moveGallery(1); return; }
    if(e.target.closest("[data-gallery-prev]")){ moveGallery(-1); return; }
  }

  function startExperience(){
    if(started)return;
    started=true;
    const intro=document.getElementById("intro");
    const main=document.getElementById("main");
    document.getElementById("startBtn")?.setAttribute("disabled","disabled");
    createXiOpeningBurst();
    intro.classList.add("is-opening");
    setTimeout(()=>{
      intro.classList.add("is-hidden");
      main.classList.add("is-ready");
      tryPlayAudio();
    },560);
  }
  function createXiOpeningBurst(){
    const intro=document.getElementById("intro");
    const entry=document.getElementById("startBtn");
    if(!intro || !entry)return;
    intro.querySelector(".xi-particles")?.remove();
    const rect=entry.getBoundingClientRect();
    const wrap=document.createElement("div");
    wrap.className="xi-particles";
    const startX=rect.left+rect.width/2;
    const startY=rect.top+rect.height/2;
    const count=44;
    for(let i=0;i<count;i++){
      const span=document.createElement("span");
      const angle=(Math.PI*2/count)*i + (i%2?0.12:-0.08);
      const distance=120 + (i%7)*28 + Math.random()*46;
      span.className="xi-particle";
      span.textContent="囍";
      span.style.setProperty("--start-x",`${startX}px`);
      span.style.setProperty("--start-y",`${startY}px`);
      span.style.setProperty("--dx",`${Math.cos(angle)*distance}px`);
      span.style.setProperty("--dy",`${Math.sin(angle)*distance}px`);
      span.style.setProperty("--rot",`${(i%2?-1:1)*(48+i*9)}deg`);
      span.style.setProperty("--scale",`${.72+(i%5)*.12}`);
      span.style.setProperty("--size",`${14+(i%6)*3}px`);
      span.style.setProperty("--delay",`${(i%9)*18}ms`);
      wrap.appendChild(span);
    }
    intro.appendChild(wrap);
    setTimeout(()=>wrap.remove(),1200);
  }
  function setMusicHint(visible){
    const hint=document.getElementById("musicHint");
    if(!hint)return;
    hint.classList.toggle("is-show",visible);
  }
  function updateMusicUi(playing){ const btn=document.getElementById("musicBtn"),label=document.getElementById("musicBtnText"); if(!btn)return; btn.classList.toggle("is-playing",playing); btn.classList.toggle("is-muted",!playing); if(label)label.textContent=playing?"播放中":"音樂"; }
  function tryPlayAudio(){
    if(!audio)return;
    audio.loop=true;
    audio.muted=false;
    audio.play().then(()=>{
      mapReturnResumePending=false;
      try{ sessionStorage.removeItem(MAP_RETURN_KEY); }catch(e){}
      document.getElementById("musicBtn").setAttribute("aria-pressed","true");
      document.getElementById("musicBtn").setAttribute("aria-label","背景音樂播放中，點擊關閉");
      updateMusicUi(true);
      musicHintLocked=true;
      setMusicHint(false);
    }).catch(()=>{
      document.getElementById("musicBtn").setAttribute("aria-pressed","false");
      document.getElementById("musicBtn").setAttribute("aria-label","背景音樂未播放，點擊播放");
      updateMusicUi(false);
      if(!musicHintLocked){
        const hint=document.getElementById("musicHint");
        if(hint) hint.textContent="點音符播放音樂";
        setMusicHint(true);
      }
    });
  }
  function announceMusicStatus(message){
    const hint=document.getElementById("musicHint");
    if(hint){
      hint.textContent=message;
      hint.classList.add("is-show");
      setTimeout(()=>{ if(hint.textContent===message) hint.classList.remove("is-show"); },2400);
    }
    showToast(message);
  }
  function toggleMusic(){
    if(!audio)return;
    if(!audio.paused){
      audio.pause();
      document.getElementById("musicBtn").setAttribute("aria-pressed","false");
      document.getElementById("musicBtn").setAttribute("aria-label","背景音樂已關閉，點擊播放");
      updateMusicUi(false);
      announceMusicStatus("背景音樂已關閉");
      return;
    }
    setMusicHint(false);
    tryPlayAudio();
  }
  function setupResponsiveInput(){
    const slider=document.getElementById("slider");
    touchSwipeEnabled=detectTouchSwipeDevice();
    slider.classList.toggle("no-touch-swipe",!touchSwipeEnabled);
    if(touchSwipeEnabled){
      slider.addEventListener("touchstart",onTouchStart,{passive:true});
      slider.addEventListener("touchmove",onTouchMove,{passive:false});
      slider.addEventListener("touchend",onTouchEnd,{passive:true});
      slider.addEventListener("touchcancel",cancelTouchDrag,{passive:true});
    }
    slider.addEventListener("wheel",onWheelPause,{passive:true});
  }
  function detectTouchSwipeDevice(){ return Boolean((navigator.maxTouchPoints>0 || "ontouchstart" in window) && (!window.matchMedia || window.matchMedia("(pointer: coarse)").matches)); }
  function onWheelPause(){ if(started) pauseAutoplay(MANUAL_PAUSE_MS); }
  function onTouchStart(e){ if(!touchSwipeEnabled || isInteractiveTarget(e.target))return; const t=e.changedTouches[0]; touchStartX=t.clientX; touchStartY=t.clientY; dragAxis=null; isDragging=true; pauseAutoplay(MANUAL_PAUSE_MS); }
  function onTouchMove(e){
    if(!isDragging)return;
    const t=e.changedTouches[0]; const dx=t.clientX-touchStartX, dy=t.clientY-touchStartY;
    if(!dragAxis && Math.max(Math.abs(dx),Math.abs(dy))>8) dragAxis=Math.abs(dx)>Math.abs(dy)*1.15?"horizontal":"vertical";
    if(dragAxis!=="horizontal")return;
    e.preventDefault();
    document.getElementById("slides").classList.add("is-dragging");
    const limitedDx=Math.max(Math.min(dx,window.innerWidth*.34),-window.innerWidth*.34);
    const pct=(-currentIndex*100)+(limitedDx/window.innerWidth*100);
    document.getElementById("slides").style.transform=`translate3d(${pct}%,0,0)`;
  }
  function onTouchEnd(e){
    if(!isDragging)return;
    const t=e.changedTouches[0]; const dx=t.clientX-touchStartX, dy=t.clientY-touchStartY;
    const axis=dragAxis;
    cancelTouchDrag();
    const threshold=Math.max(46,window.innerWidth*.14);
    if(axis!=="horizontal" || Math.abs(dy)>Math.abs(dx)*1.15 || Math.abs(dx)<threshold){ update(); return; }
    userGoTo(currentIndex+(dx<0?1:-1));
  }
  function cancelTouchDrag(){ isDragging=false; dragAxis=null; document.getElementById("slides")?.classList.remove("is-dragging"); }
  function isInteractiveTarget(target){ return Boolean(target.closest("button,a,input,textarea,select,.modal,[role=\"button\"]")); }
  function normalizeIndex(i){ return Math.max(0,Math.min(slideCount-1,i)); }
  function userGoTo(i){ pauseAutoplay(MANUAL_PAUSE_MS); goTo(i); }
  function goTo(i,fromAuto=false){ const next=normalizeIndex(i); if(next!==currentIndex) triggerPageTurn(getTurnDirection(next)); currentIndex=next; update(); scheduleAutoplay(); }
  function update(){ const slides=document.getElementById("slides"); if(slides) slides.style.transform=`translate3d(${-currentIndex*100}%,0,0)`; document.querySelectorAll(".slide").forEach((s,i)=>s.classList.toggle("is-active",i===currentIndex)); document.querySelectorAll(".dot").forEach((d,i)=>d.classList.toggle("is-active",i===currentIndex)); document.getElementById("pageLabel").textContent=`${String(currentIndex+1).padStart(2,"0")} / ${String(slideCount).padStart(2,"0")}`; document.getElementById("prevBtn").disabled=currentIndex===0; document.getElementById("nextBtn").disabled=currentIndex===slideCount-1; updateCountdown(); }
  function getTurnDirection(next){ return next>currentIndex?1:-1; }
  function setTurnGeometry(direction=1){
    const layer=document.getElementById("pageTurnLayer");
    const active=document.querySelector(".slide.is-active .photo-story-card,.slide.is-active .hero-card,.slide.is-active .paper-card,.slide.is-active .form-card,.slide.is-active .messages-card");
    if(!layer || !active)return;
    const r=active.getBoundingClientRect();
    const radius=Math.min(34,Math.max(18,Number.parseFloat(getComputedStyle(active).borderRadius)||28));
    const sheetLeft=direction<0 ? r.left : r.left + r.width/2;
    layer.style.setProperty("--turn-frame-left",`${r.left}px`);
    layer.style.setProperty("--turn-frame-top",`${r.top}px`);
    layer.style.setProperty("--turn-frame-width",`${r.width}px`);
    layer.style.setProperty("--turn-frame-height",`${r.height}px`);
    layer.style.setProperty("--turn-top",`${r.top}px`);
    layer.style.setProperty("--turn-left",`${sheetLeft}px`);
    layer.style.setProperty("--turn-width",`${r.width/2}px`);
    layer.style.setProperty("--turn-height",`${r.height}px`);
    layer.style.setProperty("--turn-radius",`${radius}px`);
  }
  function triggerPageTurn(direction=1){ const layer=document.getElementById("pageTurnLayer"); setTurnGeometry(direction); layer.classList.remove("is-turning","is-back"); if(direction<0) layer.classList.add("is-back"); void layer.offsetWidth; layer.classList.add("is-turning"); setTimeout(()=>layer.classList.remove("is-turning","is-back"),850); }
  function pauseAutoplay(ms){ clearTimeout(autoTimer); }
  function scheduleAutoplay(){ clearTimeout(autoTimer); }

  function renderCountdownUnits(){ return ["天","小時","分鐘","秒"].map(label=>`<div class="countdown-unit"><b>--</b><span>${label}</span></div>`).join(""); }
  function startCountdown(){ updateCountdown(); setInterval(updateCountdown,1000); }
  function updateCountdown(){ const el=document.getElementById("weddingCountdown"); if(!el)return; const target=new Date(CONFIG.calendar.startDateTime).getTime(); const diff=Math.max(0,target-Date.now()); const days=Math.floor(diff/86400000); const hours=Math.floor(diff%86400000/3600000); const minutes=Math.floor(diff%3600000/60000); const seconds=Math.floor(diff%60000/1000); [days,hours,minutes,seconds].forEach((value,i)=>{ const node=el.querySelectorAll("b")[i]; if(node) node.textContent=String(value).padStart(i===0?1:2,"0"); }); }
  function syncMusicStoppedUi(label="背景音樂已關閉，點擊播放"){
    const btn=document.getElementById("musicBtn");
    btn?.setAttribute("aria-pressed","false");
    btn?.setAttribute("aria-label",label);
    updateMusicUi(false);
  }
  function stopBackgroundMusic(message="背景音樂已關閉"){
    if(audio){
      audio.pause();
      audio.currentTime=0;
      audio.muted=false;
    }
    syncMusicStoppedUi("背景音樂已關閉，點擊播放");
    announceMusicStatus(message);
  }
  function forceStopBackgroundMusic(reason="page_lifecycle"){
    const media=audio || document.getElementById("audio");
    if(media){
      try{
        media.pause();
        media.currentTime=0;
        media.muted=true;
        media.loop=false;
        media.removeAttribute("autoplay");
      }catch(err){
        console.warn("forceStopBackgroundMusic failed",reason,err);
      }
    }
    syncMusicStoppedUi("背景音樂已停止，點擊播放");
    musicHintLocked=false;
    track("music_force_stop",{reason});
  }
  function bindMusicLifecycleGuards(){
    if(bindMusicLifecycleGuards.bound)return;
    bindMusicLifecycleGuards.bound=true;

    document.addEventListener("visibilitychange",()=>{
      if(document.visibilityState==="hidden"){
        forceStopBackgroundMusic("visibility_hidden");
      }else if(audio){
        audio.muted=false;
        audio.loop=true;
        if(mapReturnResumePending) resumeMusicAfterMapReturn();
      }
    },{capture:true});

    window.addEventListener("pagehide",()=>forceStopBackgroundMusic("pagehide"),{capture:true});
    window.addEventListener("beforeunload",()=>forceStopBackgroundMusic("beforeunload"),{capture:true});
    window.addEventListener("unload",()=>forceStopBackgroundMusic("unload"),{capture:true});
    window.addEventListener("blur",()=>{
      if(document.visibilityState!=="visible") forceStopBackgroundMusic("window_blur_hidden");
    },{capture:true});
    window.addEventListener("focus",()=>{ if(mapReturnResumePending) resumeMusicAfterMapReturn(); },{capture:true});
    document.addEventListener("freeze",()=>forceStopBackgroundMusic("freeze"),{capture:true});
    window.addEventListener("pageshow",()=>{
      if(audio){
        audio.muted=false;
        audio.loop=true;
      }
      if(!restoreMapReturnState()) syncMusicStoppedUi("背景音樂未播放，點擊播放");
    },{capture:true});
  }
  function rememberMapReturnState(){
    try{ sessionStorage.setItem(MAP_RETURN_KEY,JSON.stringify({index:currentIndex,time:Date.now()})); }catch(e){}
  }
  function restoreMapReturnState(){
    let state=null;
    try{ state=JSON.parse(sessionStorage.getItem(MAP_RETURN_KEY)||"null"); }catch(e){}
    if(!state || Date.now()-Number(state.time||0)>1800000)return false;
    currentIndex=normalizeIndex(Number(state.index));
    started=true;
    mapReturnResumePending=true;
    document.getElementById("intro")?.classList.add("is-hidden");
    document.getElementById("main")?.classList.add("is-ready");
    update();
    setTimeout(()=>resumeMusicAfterMapReturn(),80);
    return true;
  }
  function resumeMusicAfterMapReturn(){
    if(!mapReturnResumePending || !audio || document.visibilityState!=="visible")return;
    audio.loop=true;
    audio.muted=true;
    const attempt=audio.play();
    if(!attempt || typeof attempt.then!=="function")return;
    attempt.then(()=>{
      setTimeout(()=>{
        audio.muted=false;
        audio.loop=true;
        if(audio.paused)return;
        mapReturnResumePending=false;
        try{ sessionStorage.removeItem(MAP_RETURN_KEY); }catch(e){}
        document.getElementById("musicBtn")?.setAttribute("aria-pressed","true");
        document.getElementById("musicBtn")?.setAttribute("aria-label","背景音樂播放中，點擊關閉");
        updateMusicUi(true);
        musicHintLocked=true;
        setMusicHint(false);
      },80);
    }).catch(()=>{
      audio.muted=false;
      syncMusicStoppedUi("背景音樂未播放，點擊播放");
    });
  }
  function openMapAndCloseSite(url){ rememberMapReturnState(); stopBackgroundMusic("背景音樂已關閉，正在開啟 Google Map"); track("map_open",{}); setTimeout(()=>window.location.assign(url),520); }
  function openCalendarModal(){ document.getElementById("calendarModal").classList.add("is-open"); pauseAutoplay(60000); }
  function closeCalendarModal(){ document.getElementById("calendarModal")?.classList.remove("is-open"); }
  function toGoogleDate(dt){ return new Date(dt).toISOString().replace(/[-:]/g,"").replace(/\.\d{3}Z$/, "Z"); }
  function buildGoogleCalendarUrl(){ const cal=CONFIG.calendar; const params=new URLSearchParams({ action:"TEMPLATE", text:cal.title, dates:`${toGoogleDate(cal.startDateTime)}/${toGoogleDate(cal.endDateTime)}`, details:cal.description, location:`${CONFIG.banquet.venue}｜${CONFIG.banquet.address}`, ctz:cal.timezone }); return `https://calendar.google.com/calendar/render?${params.toString()}`; }
  function toIcsDate(dt){ return new Date(dt).toISOString().replace(/[-:]/g,"").replace(/\.\d{3}Z$/, "Z"); }
  function escapeIcsText(text){ return String(text||"").replace(/\\/g,"\\\\").replace(/;/g,"\\;").replace(/,/g,"\\,").replace(/\n/g,"\\n"); }
  function buildIcsContent(){ const cal=CONFIG.calendar; return ["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Digitools Studio//Wedding Invitation//ZH-TW","CALSCALE:GREGORIAN","METHOD:PUBLISH","BEGIN:VEVENT",`UID:${CONFIG.weddingId}@digitools-studio.github.io`,`DTSTAMP:${toIcsDate(new Date().toISOString())}`,`DTSTART:${toIcsDate(cal.startDateTime)}`,`DTEND:${toIcsDate(cal.endDateTime)}`,`SUMMARY:${escapeIcsText(cal.title)}`,`DESCRIPTION:${escapeIcsText(cal.description)}`,`LOCATION:${escapeIcsText(CONFIG.banquet.venue + "｜" + CONFIG.banquet.address)}`,"BEGIN:VALARM","TRIGGER:-P1D","ACTION:DISPLAY",`DESCRIPTION:${escapeIcsText("明天是思傑與彥綾的婚宴，記得確認時間與交通方式。")}`,"END:VALARM","END:VEVENT","END:VCALENDAR"].join("\r\n"); }
  function downloadIcs(){ downloadTextFile("sijie-yanling-wedding.ics",buildIcsContent(),"text/calendar;charset=utf-8"); showToast("已下載行事曆檔案，內含前一天提醒"); track("calendar_ics",{}); }

  function openShareModal(){ document.getElementById("shareModal").classList.add("is-open"); pauseAutoplay(60000); }
  function closeShareModal(){ document.getElementById("shareModal")?.classList.remove("is-open"); }
  function getShareUrl(){ return CONFIG.share.url || document.querySelector('link[rel="canonical"]')?.href || location.href; }
  function getShareData(){ return {title:CONFIG.share.title,text:CONFIG.share.description,url:getShareUrl()}; }
  async function shareInvitation(){
    const data=getShareData();
    try{
      if(navigator.share && (!navigator.canShare || navigator.canShare(data))){
        await navigator.share(data);
        showToast("已開啟分享");
        track("share_invitation",{method:"native"});
        return;
      }
      await copyShareLink();
    }catch(err){
      if(err.name==="AbortError") return;
      await copyShareLink("手機分享未完成，已改為複製連結");
    }
  }
  async function copyShareLink(successMessage="已複製喜帖連結，可以貼到 LINE 分享囉"){
    try{
      await copyToClipboard(getShareUrl());
      showToast(successMessage);
      track("share_invitation",{method:"copy"});
    }catch(e){
      selectShareUrl();
      showToast("已選取喜帖連結，可按複製或長按手動複製");
    }
  }
  function selectShareUrl(){
    const link=document.querySelector("[data-share-url]");
    if(!link)return;
    const range=document.createRange();
    range.selectNodeContents(link);
    const selection=window.getSelection();
    selection.removeAllRanges();
    selection.addRange(range);
    link.focus?.();
  }
  async function downloadInvitationCard(){
    try{
      const canvas=document.createElement("canvas"); canvas.width=1200; canvas.height=1600; const ctx=canvas.getContext("2d");
      const grd=ctx.createLinearGradient(0,0,1200,1600); grd.addColorStop(0,"#C38879"); grd.addColorStop(.55,"#E8B7A9"); grd.addColorStop(1,"#FFF5EC"); ctx.fillStyle=grd; ctx.fillRect(0,0,1200,1600);
      ctx.fillStyle="rgba(255,253,249,.76)"; roundRect(ctx,92,92,1016,1416,56); ctx.fill(); ctx.strokeStyle="rgba(88,48,31,.18)"; ctx.lineWidth=4; ctx.stroke();
      ctx.fillStyle="#58301F"; ctx.textAlign="center"; ctx.font="72px serif"; ctx.fillText("思傑 & 彥綾",600,360); ctx.font="40px sans-serif"; ctx.fillText("我們要結婚啦",600,450); ctx.font="34px sans-serif"; ctx.fillText("2026 . 10 . 11",600,540); ctx.font="30px sans-serif"; ctx.fillText("午宴 12:30｜梅花里活動中心",600,610);
      const qr=await loadImage(CONFIG.share.qrImage); ctx.drawImage(qr,455,760,290,290); ctx.font="24px sans-serif"; ctx.fillStyle="#7A4A3C"; ctx.fillText("掃描 QR Code",600,1100);
      canvas.toBlob(blob=>{ if(!blob)return; const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download=CONFIG.share.invitationCardFileName; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url); showToast("已下載邀請卡圖片"); },"image/png");
    }catch(e){ showToast("邀請卡產生失敗，請稍後再試"); }
  }
  function roundRect(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
  function loadImage(src){ return new Promise((resolve,reject)=>{ const img=new Image(); img.onload=()=>resolve(img); img.onerror=reject; img.src=src; }); }

  function openGallery(i){ lightboxIndex=Number.isFinite(i)?i:0; updateGallery(); document.getElementById("galleryLightbox").classList.add("is-open"); pauseAutoplay(60000); }
  function closeGallery(){ document.getElementById("galleryLightbox")?.classList.remove("is-open"); }
  function moveGallery(d){ lightboxIndex=(lightboxIndex+d+galleryKeys.length)%galleryKeys.length; updateGallery(); }
  function updateGallery(){ const keyName=galleryKeys[lightboxIndex]; const p=CONFIG.photos[keyName]; const img=document.getElementById("galleryImage"); if(p.src) img.style.backgroundImage=`url("${p.src}")`; else img.style.backgroundImage="linear-gradient(135deg, rgba(195,136,121,.55), rgba(255,253,249,.88))"; }

  function setupRsvp(){ const form=document.getElementById("rsvpForm"); if(!form)return; form.addEventListener("input",updateRsvpLivePreview); form.addEventListener("change",()=>{ updateGuestCountState(); updateRsvpLivePreview(); }); form.addEventListener("submit",submitRsvp); document.getElementById("guestPhone").addEventListener("input",()=>{ const v=document.getElementById("guestPhone").value.trim(); document.getElementById("phoneInlineError").style.display=(v && !isValidPhone(v))?"block":"none"; }); updateGuestCountState(); updateRsvpLivePreview(); }
  function getRsvpPayload(){ const f=document.getElementById("rsvpForm"); const fd=new FormData(f); return {name:String(fd.get("name")||"").trim(),phone:String(fd.get("phone")||"").trim(),attendance:String(fd.get("attendance")||"ATTEND"),guestCount:Number(fd.get("guestCount")||1),vegetarian:String(fd.get("vegetarian")||"NO"),note:String(fd.get("note")||"").trim()}; }
  function updateGuestCountState(){ const p=getRsvpPayload(); const show=p.attendance!=="DECLINE"; document.getElementById("guestCountField").style.display=show?"block":"none"; document.getElementById("vegetarianField").style.display=show?"block":"none"; document.getElementById("rsvpPendingNotice").style.display=p.attendance==="PENDING"?"block":"none"; }
  function labelAttendance(v){ return v==="ATTEND"?"會出席":v==="DECLINE"?"無法出席":"尚未確定"; }
  function updateRsvpLivePreview(){ const p=getRsvpPayload(); const el=document.getElementById("rsvpLivePreview"); if(!el)return; el.innerHTML=`<div class="summary-row"><span>您的回覆</span><b>${labelAttendance(p.attendance)}</b></div><div class="summary-row"><span>預計人數</span><b>${p.attendance==="DECLINE"?"不出席":p.guestCount+" 位"}</b></div><div class="summary-row"><span>餐食</span><b>${p.attendance==="DECLINE"?"不需安排":p.vegetarian==="YES"?"素食":"葷食"}</b></div>`; }
  function isValidPhone(v){ return /^09\d{8}$/.test(v.replace(/[\s-]/g,"")); }
  function submitRsvp(e){ e.preventDefault(); const p=getRsvpPayload(); const hint=document.getElementById("rsvpHint"); if(!p.name){hint.textContent="請先填寫姓名。";return;} if(!isValidPhone(p.phone)){hint.textContent="請填寫正確的台灣手機號碼。";return;} localStorage.setItem(key("rsvp"),JSON.stringify({...p,time:new Date().toISOString()})); hint.textContent="已收到您的回覆，謝謝你。"; renderRsvpSummary(p); track("rsvp_submit",{attendance:p.attendance}); }
  function renderLastRsvpSummary(){ const raw=localStorage.getItem(key("rsvp")); if(raw){ try{ renderRsvpSummary(JSON.parse(raw)); }catch(e){} } }
  function renderRsvpSummary(p){ const el=document.getElementById("rsvpSummary"); if(!el)return; el.innerHTML=`<div class="summary-row"><span>姓名</span><b>${escapeHtml(p.name)}</b></div><div class="summary-row"><span>電話</span><b>${escapeHtml(maskPhone(p.phone))}</b></div><div class="summary-row"><span>回覆</span><b>${labelAttendance(p.attendance)}</b></div><div class="summary-row"><span>婚宴</span><b>${CONFIG.dateText}｜${CONFIG.banquet.time}</b></div>`; }
  function maskPhone(p){ const v=String(p||""); return v.length>=7 ? `${v.slice(0,4)}***${v.slice(-3)}` : v; }

  function setupMessages(){ const form=document.getElementById("messageForm"); if(!form)return; const text=document.getElementById("msgText"); text.addEventListener("input",()=>{ document.getElementById("msgCounter").textContent=`${text.value.length} / 180`; updateMessageSecurity(); }); form.addEventListener("submit",submitMessage); updateMessageSecurity(); }
  function baseMessages(){ return [{id:"initial_1",name:"朋友代表",message:"謝謝你們讓我們一起參與這段故事，期待 10/11 見證最幸福的時刻。",time:new Date(Date.now()-86400000).toISOString()},{id:"initial_2",name:"大學同學",message:"從校園到婚禮，真的太感動了！祝你們往後每一天都像今天一樣溫暖。",time:new Date(Date.now()-172800000).toISOString()}]; }
  function getStoredMessages(){ try{ return JSON.parse(localStorage.getItem(key("messages"))||"[]"); }catch(e){ return []; } }
  function setStoredMessages(list){ localStorage.setItem(key("messages"),JSON.stringify(list)); }
  function getMessages(){ return [...getStoredMessages(),...baseMessages()].sort((a,b)=>new Date(b.time)-new Date(a.time)); }
  function renderMessagesList(){ const el=document.getElementById("messagesList"); if(!el)return; const list=getMessages(),count=document.getElementById("messageCount"); if(count)count.textContent=`${list.length} 則祝福`; if(!list.length){ el.innerHTML=`<div class="empty-state">成為第一個留下祝福的人。</div>`; return; } el.innerHTML=list.map(m=>`<article class="message-item"><div class="message-avatar" aria-hidden="true">${escapeHtml((m.name||"祝").slice(0,1))}</div><div class="message-content"><div class="message-headline"><span class="message-name">${escapeHtml(m.name)}</span><span class="message-time">${escapeHtml(formatRelativeTime(m.time))}</span></div><p class="message-text">${escapeHtml(m.message)}</p><span class="message-heart" aria-hidden="true">♡</span></div></article>`).join(""); }
  function updateMessageSecurity(){ const text=document.getElementById("msgText")?.value || ""; const el=document.getElementById("securityScore"); if(!el)return; const checked=filterMessage(text); el.textContent=checked.blocked?checked.reason:(checked.changed?"內容將自動轉換成較溫和的文字。":"祝福內容狀態：適合公開顯示"); }
  function submitMessage(e){ e.preventDefault(); const form=e.currentTarget; const hint=document.getElementById("msgHint"); const fd=new FormData(form); if(String(fd.get("website")||"").trim()){ hint.textContent="留言未送出，請稍後再試。";return; } const name=String(fd.get("name")||"").trim(); const msg=String(fd.get("message")||"").trim(); if(!name || !msg){ hint.textContent="請填寫暱稱與祝福內容。";return; } const now=Date.now(); const last=Number(localStorage.getItem(key("lastMessageAt"))||0); if(now-last<8000){ hint.textContent="剛剛已送出祝福，請稍後再留言。";return; } const recent=getStoredMessages().filter(m=>now-new Date(m.time).getTime()<3600000); if(recent.length>=5){ hint.textContent="祝福送出太頻繁，請稍後再試。";return; } if(getMessages().some(m=>m.message.trim()===msg)){ hint.textContent="這段祝福已經留下囉。";return; } const checked=filterMessage(msg); if(checked.blocked){ hint.textContent=checked.reason; return; } const record={id:`msg_${now}`,name:filterName(name),message:checked.text,time:new Date().toISOString()}; const list=getStoredMessages(); list.unshift(record); setStoredMessages(list); localStorage.setItem(key("lastMessageAt"),String(now)); form.reset(); document.getElementById("msgCounter").textContent="0 / 180"; hint.textContent="祝福已送出，謝謝你讓這一天更溫暖。"; renderMessagesList(); track("message_submit",{}); }
  function filterName(name){ return name.replace(/[<>]/g,"").slice(0,20); }
  function filterMessage(text){ const lower=text.toLowerCase(); if(/https?:\/\/|www\.|\.com|\.tw|line\.me/.test(lower)) return {blocked:true,reason:"祝福牆不支援網址或廣告內容。",text:""}; if(/<script|javascript:|onerror=|onload=|<iframe/i.test(text)) return {blocked:true,reason:"這段內容含有不適合公開顯示的語法。",text:""}; if(/(.){10,}/.test(text)) return {blocked:true,reason:"文字重複過多，請調整後再送出。",text:""}; const bad=["幹","靠北","白癡","垃圾"]; let changed=false; let out=text; bad.forEach(w=>{ if(out.includes(w)){ out=out.split(w).join("OO"); changed=true; } }); return {blocked:false,changed,text:out}; }

  function openShareLinkFallback(){ copyShareLink("已複製喜帖連結"); }
  async function copyToClipboard(text){ if(navigator.clipboard && window.isSecureContext) return navigator.clipboard.writeText(text); const ta=document.createElement("textarea"); ta.value=text; ta.setAttribute("readonly",""); ta.style.position="fixed"; ta.style.top="0"; ta.style.left="-9999px"; document.body.appendChild(ta); ta.focus(); ta.select(); ta.setSelectionRange(0,ta.value.length); const ok=document.execCommand("copy"); ta.remove(); if(!ok) throw new Error("copy failed"); }
  function downloadTextFile(filename,content,type){ const blob=new Blob([content],{type}); const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download=filename; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url); }
  let toastTimer=null; function showToast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("is-show"); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("is-show"),2400); }

  init();
})();
</script>
