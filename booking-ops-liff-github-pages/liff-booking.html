<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>LINE 預約</title>

  <link rel="stylesheet" href="./assets/styles.css" />

  <!-- LINE LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>
  <main class="booking-page">
    <header class="booking-header">
      <div>
        <p class="eyebrow">LINE Booking</p>
        <h1 id="page-title">線上預約</h1>
        <p id="page-subtitle">請選擇您方便的服務時段，系統會自動建立預約並發送確認通知。</p>
      </div>
    </header>

    <section id="status-card" class="status-card">
      <div class="spinner" aria-hidden="true"></div>
      <div>
        <strong id="status-title">正在開啟 LINE 預約系統</strong>
        <p id="status-message">請稍候，系統正在初始化 LIFF 與預約頁。</p>
      </div>
    </section>

    <section id="privacy-card" class="privacy-card">
      <strong>資料使用說明</strong>
      <p>
        本頁會使用您的 LINE User ID 與顯示名稱作為預約通知識別，並將來源參數傳入 Cal.com metadata，
        用於預約後的 Make.com 自動化、Google Sheets 紀錄與 LINE 預約通知。
      </p>
    </section>

    <section id="debug-panel" class="debug-panel hidden">
      <div class="debug-title">Debug metadata preview</div>
      <pre id="debug-output">{}</pre>
    </section>

    <section id="cal-container" class="cal-container"></section>

    <section id="fallback-card" class="fallback-card hidden">
      <p>若上方預約頁無法載入，請改用外部連結開啟。</p>
      <a id="fallback-link" class="primary-button" href="#" target="_blank" rel="noopener">開啟 Cal.com 預約頁</a>
    </section>
  </main>

  <script type="module" src="./src/app-liff.js"></script>
</body>
</html>
